version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - unconvert
    - unparam
    - prealloc
  settings:
    gosec:
      excludes:
        - G104
    staticcheck:
      checks:
        - all
        - "-ST1000"
  exclusions:
    paths:
      - frontend/node_modules
      - build/android
      - build/ios
      - build/darwin
      - build/windows
      - build/linux/appimage/build

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
