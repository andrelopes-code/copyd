version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - unconvert
    - unparam
    - prealloc
  settings:
    gosec:
      excludes:
        - G104
    staticcheck:
      checks:
        - all
        - "-ST1000"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
